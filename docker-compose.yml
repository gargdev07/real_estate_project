
services:
  db:
    image: postgres:15-alpine
    container_name: realestate_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: real_estate
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d real_estate"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: realestate_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:1234@db:5432/real_estate
      SECRET_KEY: supersecretkey_change_in_production_32chars
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app

volumes:
  postgres_data: