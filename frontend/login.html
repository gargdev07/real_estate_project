<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Estate Analytics — Login</title>
<meta name="description" content="Sign in to PropAnalytics — Real estate listing and market analysis dashboard for Indian cities.">
<link rel="stylesheet" href="css/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
  .login-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:40px; width:100%; max-width:420px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .brand { display:flex; align-items:center; gap:10px; margin-bottom:32px; }
  .brand-icon { width:40px; height:40px; background:var(--accent); border-radius:10px;
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px; }
  .brand-name { font-size:18px; font-weight:600; color:var(--text); }
  .brand-sub  { font-size:12px; color:var(--muted); }
  .login-title { font-size:22px; font-weight:600; color:var(--text); margin-bottom:6px; }
  .login-sub   { font-size:14px; color:var(--muted); margin-bottom:28px; }
  .form-group  { margin-bottom:18px; }
  label { display:block; font-size:13px; font-weight:500; color:var(--text); margin-bottom:6px; }
  input[type=text], input[type=password] {
    width:100%; padding:10px 14px; border:1.5px solid var(--border);
    border-radius:8px; font-size:14px; background:var(--bg); color:var(--text);
    box-sizing:border-box; transition:border-color .15s;
  }
  input:focus { outline:none; border-color:var(--accent); }
  .btn-login {
    width:100%; padding:12px; background:var(--accent); color:#fff;
    border:none; border-radius:8px; font-size:15px; font-weight:600;
    cursor:pointer; margin-top:8px; transition:opacity .15s;
  }
  .btn-login:hover { opacity:0.9; }
  .btn-login:disabled { opacity:0.6; cursor:not-allowed; }
  .error-msg { background:#fef2f2; color:#b91c1c; border:1px solid #fecaca;
    border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:16px; display:none; }
  .hint { margin-top:20px; background:var(--surface2); border-radius:8px; padding:12px 14px; }
  .hint p { font-size:12px; color:var(--muted); margin:0 0 4px; }
  .hint code { font-size:12px; color:var(--accent); background:transparent; }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-icon">🏠</div>
    <div>
      <div class="brand-name">PropAnalytics</div>
      <div class="brand-sub">Real Estate Intelligence</div>
    </div>
  </div>
  <div class="login-title">Welcome back</div>
  <div class="login-sub">Sign in to access the analytics dashboard</div>
  <div class="error-msg" id="errorMsg"></div>
  <form id="loginForm">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
  </form>
  <div class="hint">
    <p>Demo credentials:</p>
    <p><code>admin / admin123</code> &nbsp;·&nbsp; <code>analyst / analyst123</code></p>
  </div>
</div>
<script src="js/api.js"></script>
<script>
  if (localStorage.getItem('re_token')) window.location.href = 'index.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.style.display = 'none';
    try {
      const data = await API.login(
        document.getElementById('username').value,
        document.getElementById('password').value
      );
      localStorage.setItem('re_token', data.access_token);
      window.location.href = 'index.html';
    } catch (ex) {
      err.textContent = ex.message || 'Invalid credentials. Please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
